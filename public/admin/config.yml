backend:
  name: github
  repo: thamswork/tnc-18-project
  branch: main
  base_url: https://tnc-18-auth.tyme-sak.workers.dev

media_folder: "public/uploads"
public_folder: "/uploads"

collections:

  # ── PORTFOLIO ────────────────────────────────────────────────────────────────
  - name: projects
    label: Portfolio
    label_singular: Project
    folder: src/content/projects
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "Title",              name: title,       widget: string }
      - { label: "Year",               name: year,        widget: number, value_type: int }
      - label: "Category"
        name: category
        widget: select
        options: [Residential, Commercial, Interior, Mixed-Use, Hospitality, Retail, Pop-up]
      - { label: "Client",             name: client,      widget: string,  required: false }
      - { label: "Location / Mall",    name: location,    widget: string,  required: false,
          hint: "e.g. Siam Paragon — shown in the meta row on the portfolio card" }
      - { label: "Size (e.g. 120 SQ.M)", name: size,     widget: string,  required: false }
      - { label: "Cover Image",        name: cover,       widget: image }
      - label: "Media Type"
        name: media_type
        widget: select
        options: [photo, video]
        default: photo
        required: false
      - { label: "Hero Video URL",     name: video_url,   widget: string,  required: false,
          hint: "Paste a direct .mp4 URL (Cloudinary recommended). Leave blank to use Cover Image." }
      - label: "Gallery Images"
        name: gallery
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - { label: "Short Description",  name: description, widget: text,    required: false }
      - { label: "Featured on homepage", name: featured,  widget: boolean, default: false }
      - { label: "Body Content",       name: body,        widget: markdown, required: false }

  # ── SERVICES ─────────────────────────────────────────────────────────────────
  - name: services
    label: Services
    folder: src/content/services
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Order",          name: order,       widget: number, value_type: int }
      - { label: "Title",          name: title,       widget: string }
      - { label: "Description",    name: description, widget: text,   required: false }
      - { label: "Icon (emoji or short label)", name: icon, widget: string, required: false }

  # ── PAGE CONTENT ─────────────────────────────────────────────────────────────
  - name: pages
    label: "Page Content"
    delete: false
    editor: { preview: false }
    files:

      - name: homepage
        label: "Homepage"
        file: src/content/pages/homepage.json
        fields:
          - label: "Hero Slides (auto-play slideshow)"
            name: hero_slides
            widget: list
            required: false
            hint: "Upload 3-6 images for the hero slideshow"
            field: { label: "Slide Image", name: image, widget: image }
          - label: "Hero Header Image"
            name: hero_image
            widget: image
            required: false
            hint: "Pulled ONLY from this field — never from portfolio. Upload a dedicated header image."
          - { label: "Hero Video URL", name: hero_video, widget: string, required: false,
              hint: "Paste a .mp4 URL to use video instead of image. Leave blank for image." }
          - { label: "Hero Headline Line 1", name: hero_line1, widget: string }
          - { label: "Hero Headline Line 2", name: hero_line2, widget: string }
          - { label: "Hero Subline",         name: hero_sub,   widget: string, required: false }
          - { label: "Statement / Tagline",  name: statement,  widget: text }
          - label: "Statement Background Image"
            name: statement_image
            widget: image
            required: false
          - { label: "About Headline",       name: about_headline, widget: string }
          - { label: "About Body",           name: about_body,     widget: text }

      - name: about_services
        label: "About & Services Page"
        file: src/content/pages/about-services.json
        fields:
          - label: "Header Image"
            name: hero_image
            widget: image
            required: false
            hint: "Dedicated header image — NOT pulled from portfolio."
          - { label: "Page Headline",    name: headline,    widget: string }
          - { label: "Mission Statement", name: mission,    widget: text }
          - { label: "Bio Paragraph 1",  name: bio_1,      widget: text }
          - { label: "Bio Paragraph 2",  name: bio_2,      widget: text,   required: false }
          - { label: "Owner Name",       name: owner_name, widget: string, required: false }
          - { label: "Owner Title",      name: owner_title, widget: string, required: false }
          - label: "Owner Photo (optional, keep small)"
            name: owner_photo
            widget: image
            required: false
            hint: "Shown small. Portfolio work is the visual priority."
          - { label: "Years Experience", name: years,      widget: string, required: false }
          - { label: "Projects Completed", name: projects, widget: string, required: false }

      - name: contact_page
        label: "Contact Page"
        file: src/content/pages/contact.json
        fields:
          - { label: "Headline", name: headline, widget: string }
          - { label: "Subtext",  name: subtext,  widget: text,   required: false }
          - { label: "Line CTA Label", name: line_label, widget: string, default: "Message us on Line" }
          - { label: "Response Promise", name: promise, widget: string, required: false,
              hint: "e.g. We reply within 2 hours" }

          - label: "Background Photo (upload your own)"
            name: hero_image
            widget: image
            required: false
            hint: "Upload any photo to use as the full-page background on the Contact page."

          - label: "Background Photos (multiple — first is used)"
            name: hero_images
            widget: list
            required: false
            hint: "Upload multiple photos. The first one will be used as background."
            field:
              label: "Photo"
              name: image
              widget: image

          - label: "Select Background from Portfolio"
            name: hero_project
            widget: relation
            collection: projects
            search_fields: [title, location, category]
            value_field: title
            display_fields: [title]
            required: false
            hint: "Pick one project — its cover photo becomes the background."

          - label: "Slideshow All Portfolio Photos"
            name: hero_slideshow
            widget: boolean
            default: false
            required: false
            hint: "Turn ON to cycle through ALL portfolio project covers as an animated background slideshow. Overrides single project selection above."

          - label: "Background Video URL"
            name: hero_video
            widget: string
            required: false
            hint: "Paste a direct .mp4 URL. Highest priority — overrides all photos."

      - name: contact
        label: "Contact & Social Links"
        file: src/content/settings/contact.json
        fields:
          - { label: "Phone",           name: phone,      widget: string, required: false }
          - { label: "Email",           name: email,      widget: string, required: false }
          - label: "Line OA URL"
            name: line
            widget: string
            required: false
            hint: "Full URL e.g. https://line.me/ti/p/~@yourhandle — used for all CTA buttons"
          - label: "Instagram URL"
            name: instagram
            widget: string
            required: false
            hint: "Full URL e.g. https://instagram.com/yourhandle"
          - label: "TikTok URL"
            name: tiktok
            widget: string
            required: false
            hint: "Full URL e.g. https://tiktok.com/@yourhandle"
          - { label: "Facebook URL",    name: facebook,   widget: string, required: false }
          - { label: "Address",         name: address,    widget: text,   required: false }

      - name: siteinfo
        label: "Site Info & SEO"
        file: src/content/settings/siteinfo.json
        fields:
          - { label: "Site Name",         name: site_name,  widget: string }
          - { label: "Tagline",           name: tagline,    widget: string }
          - { label: "Meta Description",  name: meta_desc,  widget: text }
          - { label: "Google Analytics ID", name: ga_id,   widget: string, required: false,
              hint: "e.g. G-XXXXXXXXXX" }
